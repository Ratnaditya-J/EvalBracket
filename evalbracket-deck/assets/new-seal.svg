      <stop offset="0" stop-color="#F25A4C"/>
      <stop offset="1" stop-color="#D9362A"/>
    </linearGradient>
    <radialGradient id="face" cx="42%" cy="32%" r="72%">
      <stop offset="0" stop-color="#F76052"/>
      <stop offset="0.68" stop-color="#EB4437"/>
      <stop offset="1" stop-color="#D93429"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="155%">
