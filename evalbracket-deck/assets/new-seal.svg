<svg xmlns="http://www.w3.org/2000/svg" width="512" height="560" viewBox="0 0 512 560" role="img" aria-labelledby="title desc">
  <title id="title">New seal badge</title>
  <desc id="desc">A coral red award seal with cream lettering spelling NEW on a transparent background.</desc>

  <defs>
