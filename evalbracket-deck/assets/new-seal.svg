    <path d="M363 357 L394 486 L338 456 L305 507 L277 377" fill="none" stroke="#FFF1D7" stroke-width="7" stroke-linejoin="round"/>

    <circle cx="256" cy="220" r="184" fill="#EF4B3E"/>
    <circle cx="256" cy="220" r="185" fill="none" stroke="#EF4B3E" stroke-width="38" stroke-linecap="round" stroke-dasharray="1 23.2"/>
    <circle cx="256" cy="220" r="177" fill="none" stroke="#FF786B" stroke-width="6"/>
    <circle cx="256" cy="220" r="157" fill="url(#face)" stroke="#C92E24" stroke-width="7"/>
    <circle cx="256" cy="220" r="143" fill="none" stroke="#FFF1D7" stroke-width="8"/>

    <text x="256" y="263" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="800" letter-spacing="2" fill="#FFF1D7" stroke="#FFF1D7" stroke-width="1">NEW</text>
